; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ESP32-C6-DevKitM-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.35/platform-espressif32.zip
framework = arduino
board = esp32-c6-devkitm-1
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = part.csv
extra_scripts = pre:set_env.py
lib_ignore = 
	BLE
	BluetoothSerial
	SimpleBLE
	WiFiProv
lib_deps = 
	;tobozo/ESP32-targz@^1.2.4
	https://github.com/smarthomeagentur/GxEPD2.git@^1.6.6
	adafruit/Adafruit GFX Library@^1.11.11
	chrisjoyce911/esp32FOTA@^0.2.9
	ricmoo/QRCode@^0.0.1
	bblanchon/ArduinoJson@^7.3.0
	olikraus/U8g2_for_Adafruit_GFX@^1.8.0
	256dpi/MQTT@^2.5.2
	ldab/KXTJ3-1057@^0.1.1
	paulstoffregen/SerialFlash@0.0.0-alpha+sha.2b86eb1e43
	h2zero/NimBLE-Arduino@^2.3.4