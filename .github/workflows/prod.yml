name: "Prod Build"
run-name: "3.0.${{ github.run_number }}"

env:
  FW_VERSION: "3.0.${{ github.run_number }}"
  FW_VERSION_DEVICE: "3.0.${{ github.run_number }}"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - epd_type: 13INCH
            suffix: epd13
          - epd_type: 7INCH
            suffix: epd7
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Restore PlatformIO Cache
        id: cache-pio-restore
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('deploy/platformio.ini') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ hashFiles('deploy/platformio.ini') }}-
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Inject secrets.h
        env:
          SECRETS_H: ${{ secrets.SECRETS_H }}
        run: |
          echo "$SECRETS_H" > src/secrets.h

      - name: Inject .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_FILE" > .env

      - name: Set version and debug flag
        run: |
          newversion="${{ env.FW_VERSION_DEVICE }}"
          
          # Set EPD Type
          if [ "${{ matrix.epd_type }}" == "13INCH" ]; then
            sed -i 's/\/\/ #define EPD_TYPE_13INCH/#define EPD_TYPE_13INCH/g' src/types.h
            sed -i 's/#define EPD_TYPE_7INCH/\/\/ #define EPD_TYPE_7INCH/g' src/types.h
          else
            sed -i 's/#define EPD_TYPE_13INCH/\/\/ #define EPD_TYPE_13INCH/g' src/types.h
            sed -i 's/\/\/ #define EPD_TYPE_7INCH/#define EPD_TYPE_7INCH/g' src/types.h
          fi
          
          # Replace version in types.h
          sed -i -e "s/0\.0\.0/$newversion/g" src/types.h
          
          # Replace DEBUG flag in types.h
          sed -i -E "s/#define DEBUG [01]/#define DEBUG 0/g" src/types.h
          
          # Remove test() call from main.cpp
          sed -i '/test();.*please remove/d' src/main.cpp
          
          cp ./deploy/platformio.ini ./platformio.ini

      - name: Install PlatformIO Dependencies
        run: pio pkg install

      - name: Run PlatformIO Build
        id: build
        run: |
          if ! pio run; then
            echo "::warning::Build with cache failed. Retrying clean build..."
            rm -rf .pio
            pio pkg install
            pio run
            echo "rebuild=true" >> $GITHUB_OUTPUT
          fi

      - name: Save PlatformIO Cache
        if: steps.cache-pio-restore.outputs.cache-matched-key == '' || steps.build.outputs.rebuild == 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('deploy/platformio.ini') }}-${{ github.run_id }}

      - name: Verify and Prepare Artifacts
        run: |
          if [ ! -f "./.pio/build/ESP32-C6-DevKitM-1/firmware.bin" ]; then
            echo "::error::Build failed: firmware.bin was not created."
            exit 1
          fi
          
          ls -la
          mkdir artifact
          newversion="${{ env.FW_VERSION_DEVICE }}"
          
          # Base files
          cp ./.pio/build/ESP32-C6-DevKitM-1/firmware.bin ./artifact/firmware_${{ matrix.suffix }}.bin
          cp ./.pio/build/ESP32-C6-DevKitM-1/firmware.bin ./artifact/firmware_${{ matrix.suffix }}_pre.bin
          
          # JSON files mapping
          cat deploy/espfota.json | sed "s/X.X.X/$newversion/g" | sed "s|http://sample.de/firmware.bin|http://${{ secrets.S3_BUCKET_NAME }}/firmware_${{ matrix.suffix }}.bin|g" > ./artifact/espfota_${{ matrix.suffix }}.json
          cat deploy/espfota.json | sed "s/X.X.X/$newversion/g" | sed "s|http://sample.de/firmware.bin|http://${{ secrets.S3_BUCKET_NAME }}/firmware_${{ matrix.suffix }}_pre.bin|g" > ./artifact/espfota_${{ matrix.suffix }}_pre.json

      - name: Publish Pipeline Artifact
        uses: actions/upload-artifact@v7
        with:
          name: epaper_fw_${{ matrix.suffix }}_${{ env.FW_VERSION }}
          path: artifact/

  deploy_pre:
    runs-on: ubuntu-latest
    needs: build
    environment: s3-upload-dev
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: S3 Upload Firmware and JSON (Pre)
        run: |
          for dir in all-artifacts/*/ ; do
            [ -d "$dir" ] || continue
            
            aws s3 cp "$dir" s3://${{ secrets.S3_BUCKET_NAME }}/ --recursive --exclude "*" --include "firmware_*_pre.bin" --include "espfota_*_pre.json" --acl public-read
            
            # Zip needs to contain non-pre versions!
            folder_name=$(basename "$dir")
            cd "$dir"
            zip -r "../../${folder_name}.zip" firmware_*.bin espfota_*.json -x "*_pre*"
            cd ../../
            aws s3 cp "${folder_name}.zip" s3://${{ secrets.S3_BUCKET_NAME }}/ --acl public-read
          done

  deploy_prod_epd7:
    runs-on: ubuntu-latest
    needs: deploy_pre
    environment: s3-upload-epd7
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: S3 Upload Firmware and JSON (Prod EPD7)
        run: |
          for dir in all-artifacts/*/ ; do
            [ -d "$dir" ] || continue
            aws s3 cp "$dir" s3://${{ secrets.S3_BUCKET_NAME }}/ --recursive --exclude "*" --include "firmware_epd7.bin" --include "espfota_epd7.json" --acl public-read
          done

  deploy_prod_epd13:
    runs-on: ubuntu-latest
    needs: deploy_pre
    environment: s3-upload-epd13
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: S3 Upload Firmware and JSON (Prod EPD13)
        run: |
          for dir in all-artifacts/*/ ; do
            [ -d "$dir" ] || continue
            aws s3 cp "$dir" s3://${{ secrets.S3_BUCKET_NAME }}/ --recursive --exclude "*" --include "firmware_epd13.bin" --include "espfota_epd13.json" --acl public-read
          done
